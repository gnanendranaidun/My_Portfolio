<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnanendra Portfolio | Blog</title>

    <link rel="stylesheet" href="assets/css/styles.css">

    <!-- =====BOX ICONS===== -->
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css" rel="stylesheet">

    <style>
        #pdf-container {
            max-width: 900px;
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        .fallback {
            text-align: center;
            padding: 40px;
        }

        .fallback a {
            display: block;
            margin: 10px;
            font-weight: 500;
            text-decoration: none;
        }

        .pdf-actions {
            text-align: center;
            margin-top: 20px;
        }

        .pdf-actions a {
            margin: 0 10px;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <!-- Blog Section -->
    <section id="blog">
        <h1 style="text-align: center; margin-top: 40px;">
            Blog of YC 18 Apr 2026
        </h1>

        <!-- Top Actions -->
        <div class="pdf-actions">
            <a href="blog2.pdf" target="_blank">📄 Open PDF</a>
            |
            <a href="https://www.linkedin.com/posts/gnanendranaidun_startups-ycombinator-buildinpublic-activity-7452061380561616896-J3E8?utm_source=share&utm_medium=member_desktop&rcm=ACoAAEg_wbIBgVA5wmxmco4Y7S6l6lZo5wW5xHg" target="_blank">
                🔗 LinkedIn
            </a>
        </div>

        <!-- PDF Viewer -->
        <div id="pdf-container">
            <object 
                data="blog2.pdf" 
                type="application/pdf" 
                width="100%" 
                height="800px">

                <!-- Fallback -->
                <div class="fallback">
                    <p>Unable to load the blog here.</p>

                    <a href="blog2.pdf" target="_blank">
                        📄 Open PDF
                    </a>

                    <a href="https://www.linkedin.com/posts/gnanendranaidun_startups-ycombinator-buildinpublic-activity-7452061380561616896-J3E8?utm_source=share&utm_medium=member_desktop&rcm=ACoAAEg_wbIBgVA5wmxmco4Y7S6l6lZo5wW5xHg" target="_blank">
                        🔗 Read on LinkedIn
                    </a>
                </div>

            </object>
        </div>

    </section>

</body>
</html>
